# Theme files live in this repo. Tabler icons are mounted from npm so
# the svg-icon partial can inline them.

[[mounts]]
  source = "content"
  target = "content"

[[mounts]]
  source = "layouts"
  target = "layouts"

[[mounts]]
  source = "data"
  target = "data"

[[mounts]]
  source = "i18n"
  target = "i18n"

[[mounts]]
  source = "archetypes"
  target = "archetypes"

[[mounts]]
  source = "assets"
  target = "assets"

[[mounts]]
  source = "node_modules/@tabler/icons/icons"
  target = "assets/icons/tabler"

[[mounts]]
  source = "static"
  target = "static"
