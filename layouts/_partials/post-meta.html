{{- $author := .Params.author | default "Matthew A. Davis" -}}
<div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-ink-500 dark:text-ink-400">
  <time datetime="{{ .Date.Format "2006-01-02" }}">
    {{ .Date.Format "January 2, 2006" }}
  </time>
  <span aria-hidden="true">·</span>
  <span>{{ .ReadingTime }} min read</span>
  <span aria-hidden="true">·</span>
  <span>by {{ $author }}</span>
  {{- with .Params.tags }}
    <span aria-hidden="true">·</span>
    <ul class="flex flex-wrap gap-2">
      {{- range . }}
        <li>
          <a class="rounded-full bg-ink-100 px-2.5 py-0.5 text-xs text-ink-700 hover:bg-copper-100 hover:text-copper-700 dark:bg-ink-800 dark:text-ink-300 dark:hover:bg-copper-900/40 dark:hover:text-copper-300"
             href="{{ "/tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a>
        </li>
      {{- end }}
    </ul>
  {{- end }}
</div>
