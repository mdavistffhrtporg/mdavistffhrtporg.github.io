{{- if not .IsHome -}}
{{- $current := . -}}
<nav aria-label="Breadcrumb" class="mb-6 text-sm text-ink-500 dark:text-ink-400">
  <ol class="flex flex-wrap items-center gap-1.5">
    <li><a href="/" class="hover:text-ink-700 dark:hover:text-ink-200">Home</a></li>
    {{- range .Ancestors.Reverse -}}
      {{- if not .IsHome -}}
        <li aria-hidden="true" class="text-ink-300 dark:text-ink-600">/</li>
        <li><a href="{{ .RelPermalink }}" class="hover:text-ink-700 dark:hover:text-ink-200">{{ .Title }}</a></li>
      {{- end -}}
    {{- end -}}
    <li aria-hidden="true" class="text-ink-300 dark:text-ink-600">/</li>
    <li class="text-ink-700 dark:text-ink-200" aria-current="page">{{ .Title }}</li>
  </ol>
</nav>
{{- end -}}
