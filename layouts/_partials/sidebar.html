{{- $section := .Section -}}
{{- $sectionPage := site.GetPage (printf "/%s" $section) -}}
{{- if $sectionPage -}}
<nav aria-label="Section" class="sticky top-24">
  <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-ink-500 dark:text-ink-400">{{ $sectionPage.Title }}</h2>
  <ul class="space-y-1 text-sm">
    <li>
      <a href="{{ $sectionPage.RelPermalink }}" class="block rounded px-3 py-1.5 {{ if eq .RelPermalink $sectionPage.RelPermalink }}bg-ink-100 font-medium text-ink-900 dark:bg-ink-800 dark:text-white{{ else }}text-ink-600 hover:bg-ink-50 hover:text-ink-900 dark:text-ink-400 dark:hover:bg-ink-900 dark:hover:text-white{{ end }}">Overview</a>
    </li>
    {{- range $sectionPage.Pages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}" class="block rounded px-3 py-1.5 {{ if eq $.RelPermalink .RelPermalink }}bg-ink-100 font-medium text-ink-900 dark:bg-ink-800 dark:text-white{{ else }}text-ink-600 hover:bg-ink-50 hover:text-ink-900 dark:text-ink-400 dark:hover:bg-ink-900 dark:hover:text-white{{ end }}">{{ .Title }}</a>
      </li>
    {{- end }}
  </ul>
</nav>
{{- end -}}
