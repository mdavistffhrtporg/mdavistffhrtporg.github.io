{{ define "main" }}
<section class="container-page py-24 lg:py-32">
  <div class="mx-auto max-w-xl text-center">
    <p class="font-mono text-sm uppercase tracking-widest text-copper-700 dark:text-copper-400">404</p>
    <h1 class="mt-4 text-balance text-4xl font-semibold tracking-tight text-ink-900 sm:text-5xl dark:text-white">
      That page doesn't exist.
    </h1>
    <p class="mt-4 text-lg text-ink-600 dark:text-ink-300">
      It may have moved, been renamed, or never existed. Try the homepage or search the site.
    </p>
    <div class="mt-8 flex justify-center gap-3">
      <a href="/" class="btn btn-primary">Home</a>
      <a href="/posts/" class="btn btn-ghost">Posts</a>
    </div>
  </div>
</section>
{{ end }}
